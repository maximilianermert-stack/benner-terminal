<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Benner Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- Titlebar / drag handle -->
    <div id="titlebar">
      <span class="wordmark">BENNER TERMINAL</span>
      <div class="titlebar-actions">
        <button id="pin-btn" class="titlebar-btn" title="Toggle always on top">TOP</button>
        <button id="close-btn" class="titlebar-btn close-btn">✕</button>
      </div>
    </div>

    <!-- Live ticker bar -->
    <div id="ticker-bar">
      <div id="ticker-track">
        <span class="tick-loading">Loading quotes…</span>
      </div>
    </div>

    <!-- Tabs -->
    <div id="tabs">
      <button class="tab active" data-tab="news">NEWS</button>
      <button class="tab" data-tab="picks">PICKS</button>
      <button class="tab" data-tab="chat">AI CHAT</button>
    </div>

    <!-- Content -->
    <div id="content">

      <!-- NEWS TAB -->
      <div id="tab-news" class="tab-content active">
        <div id="news-list">
          <div class="state-msg">Fetching market news…</div>
        </div>
        <button id="refresh-news" class="fab-refresh" title="Refresh news">↺</button>
      </div>

      <!-- PICKS TAB -->
      <div id="tab-picks" class="tab-content">
        <div class="picks-header">
          <span class="picks-label">BENNER CYCLE PICKS · 2026</span>
          <span class="picks-meta">Late cycle · Peak watch</span>
        </div>
        <div id="picks-list">
          <div class="state-msg">Loading picks…</div>
        </div>
      </div>

      <!-- CHAT TAB -->
      <div id="tab-chat" class="tab-content">
        <div id="chat-messages">
          <div class="chat-intro">
            <span class="chat-intro-label">BENNER TERMINAL AI · 2026</span>
            Late bull market phase. Ask me about Benner cycle positioning, sector rotation, or specific tickers.
          </div>
        </div>
        <div id="chat-footer">
          <textarea id="chat-input" placeholder="Ask about Benner cycle, positioning…" rows="2"></textarea>
          <button id="send-btn">↑</button>
        </div>
      </div>

    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
